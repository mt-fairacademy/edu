<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrepreneurship &amp; Small Business Management — Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --nero: #1a1a1a;
      --oro:  #B8922A;
      --panna: #FAF7F2;
    }
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--panna);
      color: var(--nero);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate {
      max-width: 420px;
      width: 90%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 32px rgba(184,146,42,0.13);
      padding: 44px 32px 36px;
      text-align: center;
    }
    .gate-logo {
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--oro);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .gate h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--nero);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .gate-sub {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 28px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input[type="password"]:focus { border-color: var(--oro); }
    .btn-enter {
      width: 100%;
      background: var(--nero);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 13px 22px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-enter:hover { background: var(--oro); }
    .error {
      color: #c0392b;
      font-size: 0.88rem;
      margin-top: 12px;
      min-height: 1.2em;
    }
    .back-link {
      display: inline-block;
      margin-top: 22px;
      font-size: 0.82rem;
      color: #aaa;
      text-decoration: none;
    }
    .back-link:hover { color: var(--nero); }
  </style>
</head>
<body>
  <div class="gate">
    <div class="gate-logo">Fair Academy</div>
    <h1>Entrepreneurship &amp; Small Business Management</h1>
    <p class="gate-sub">Enter your course password to continue</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
    <button class="btn-enter" onclick="checkPW()">Enter →</button>
    <div id="err" class="error"></div>
    <a href="../../index.html" class="back-link">← Back to course hub</a>
  </div>

  <script>
    const CORRECT_PASSWORD = 'mtentresmbsp26';
    const DEFAULT_DEST     = 'test-1.html';

    function getDestination() {
      var params = new URLSearchParams(window.location.search);
      var to = params.get('to');
      // Only allow relative filenames (no slashes, no protocol) to prevent open redirect
      if (to && /^[a-zA-Z0-9_\-]+\.html$/.test(to)) {
        return to;
      }
      return DEFAULT_DEST;
    }

    function checkPW() {
      var input = document.getElementById('pw').value;
      if (input === CORRECT_PASSWORD) {
        window.location.href = getDestination();
      } else {
        document.getElementById('err').textContent = 'Incorrect password. Please try again.';
      }
    }

    // Allow pressing Enter in the password field
    document.getElementById('pw').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') checkPW();
    });
  </script>
</body>
</html>
